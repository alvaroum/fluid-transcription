name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build package
        run: swift build
      - name: Smoke-run version command
        run: ./.build/debug/FluidTranscriptionCLI version