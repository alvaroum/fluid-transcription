name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: swift build
      - name: Smoke-run version command
        run: ./.build/debug/FluidTranscriptionCLI version
      - name: Build release binary
        run: swift build -c release
      - name: Stage release layout
        run: |
          mkdir -p release/bin
          cp .build/release/FluidTranscriptionCLI release/bin/ft
          chmod +x release/bin/ft
          ln -sf ft release/bin/fluid-transcription
      - name: Build installer package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          mkdir -p pkgroot/usr/local/bin
          cp release/bin/ft pkgroot/usr/local/bin/ft
          chmod 755 pkgroot/usr/local/bin/ft
          ln -sf ft pkgroot/usr/local/bin/fluid-transcription
          pkgbuild \
            --root pkgroot \
            --identifier com.alvaroum.fluid-transcription \
            --version "$VERSION" \
            --install-location / \
            "release/fluid-transcription-${VERSION}-macos-${ARCH}.pkg"
      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          tar -czf "release/fluid-transcription-${VERSION}-macos-${ARCH}.tar.gz" -C release bin
      - name: Generate checksums
        run: |
          cd release
          shasum -a 256 ./*.pkg ./*.tar.gz > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*